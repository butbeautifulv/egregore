services:
  cys-agi:
    build:
      context: .
      target: runtime
    image: cys-agi:secure
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=./deploy/seccomp/cys-agi-seccomp.json
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    environment:
      STAGE: prod
      PERSISTENCE_CONNECTOR: postgres
      USE_MEMORY_FALLBACK: "false"
    networks:
      - agent_internal
    depends_on:
      - postgres
      - redis

  reverse-proxy:
    image: nginx:1.27-alpine
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=32m
      - /var/run:rw,noexec,nosuid,nodev,size=8m
    volumes:
      - ./deploy/nginx/cys-agi.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/tls:/etc/nginx/tls:ro
      - ./deploy/mtls:/etc/nginx/mtls:ro
    ports:
      - "8443:8443"
    networks:
      - edge
      - agent_internal
    depends_on:
      - cys-agi

  postgres:
    image: postgres:16-alpine
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /run/postgresql:rw,noexec,nosuid,nodev,size=8m
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cys_agi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    networks:
      - agent_internal

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes", "--protected-mode", "yes"]
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    volumes:
      - redis_data:/data
    networks:
      - agent_internal

networks:
  edge:
  agent_internal:
    internal: true

volumes:
  postgres_data:
  redis_data:

secrets:
  postgres_password:
    file: ./deploy/secrets/postgres_password.txt

name: Deploy Preprod

on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to preprod
        run: |
          echo "kubectl set image deployment/api api=ghcr.io/${{ github.repository }}-api:${{ github.sha }} -n preprod"
          echo "kubectl set image deployment/worker worker=ghcr.io/${{ github.repository }}-worker:${{ github.sha }} -n preprod"

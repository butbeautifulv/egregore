name: Deploy Preprod

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - uses: actions/checkout@v7
      - name: Deploy to preprod
        run: |
          echo "kubectl set image deployment/app app=ghcr.io/${{ github.repository }}:${{ github.sha }} -n preprod"

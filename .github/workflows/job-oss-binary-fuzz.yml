name: OSS Binary Fuzz

on:
  workflow_call:
    inputs:
      fuzz_time:
        required: false
        type: string
        default: "30"
      fuzz_targets:
        required: false
        type: string
        default: "auto"

permissions:
  contents: read

jobs:
  binary-fuzz:
    runs-on: ubuntu-latest
    env:
      FUZZ_TIME: ${{ inputs.fuzz_time }}
      FUZZ_TARGETS: ${{ inputs.fuzz_targets }}
    steps:
      - uses: actions/checkout@v4
      - name: Binary fuzz (AFL++ / Go / Jazzer)
        run: |
          chmod +x scripts/run-binary-fuzz.sh
          bash scripts/run-binary-fuzz.sh "$PWD" reports/binary-fuzz-junit.xml
      - name: Gate check
        if: always()
        run: |
          [ -f reports/binary-fuzz-junit.xml ] || \
            python3 scripts/binary-fuzz-to-junit.py -o reports/binary-fuzz-junit.xml \
              --result "binary-fuzz:error:missing report"
          python3 scripts/gate-check.py --control binary_fuzz --report reports/binary-fuzz-junit.xml
      - name: ASPM export
        if: always() && vars.DEFECTDOJO_URL != ''
        env:
          DEFECTDOJO_URL: ${{ vars.DEFECTDOJO_URL }}
          DEFECTDOJO_API_TOKEN: ${{ secrets.DEFECTDOJO_API_TOKEN }}
        run: python3 scripts/aspm-export.py --control binary_fuzz --report reports/binary-fuzz-junit.xml || true
      - uses: actions/upload-artifact@v4
        with:
          name: binary-fuzz-junit
          path: reports/binary-fuzz-junit.xml

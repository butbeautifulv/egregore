# GitHub profile: shift-left — flat security jobs (no nested security-gates orchestrator)
#
# SUPERSEDED by release-gate.yml (2026-07-15): this was a leftover
# fabrica reference profile (its own `build` job is a literal stub —
# `echo "build stub — see templates/github/workflows/ci.yml"`) that was
# never removed after adoption, and defaulted to the warn-only "adopt"
# policy. Kept for manual/debug use only; not auto-triggered.
name: CI Shift Left

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  SECURITY_POLICY: config/security-gate-policy-adopt.yaml
  ENABLE_REAL_LINTERS: "false"

jobs:
  validate:
    uses: ./.github/workflows/base-validate.yml
    with:
      enable_real_linters: false
    secrets: inherit

  secrets:
    needs: [validate]
    uses: ./.github/workflows/job-secret-scan.yml
    secrets: inherit
  sast:
    needs: [validate]
    uses: ./.github/workflows/job-sast.yml
    secrets: inherit
  osa:
    needs: [validate]
    uses: ./.github/workflows/job-osa.yml
    secrets: inherit
  iac:
    needs: [validate]
    uses: ./.github/workflows/job-iac-scan.yml
    secrets: inherit
  dockerfile:
    needs: [validate]
    uses: ./.github/workflows/job-dockerfile-lint.yml
    secrets: inherit
  linters:
    needs: [validate]
    uses: ./.github/workflows/job-linter-security.yml
    secrets: inherit

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [secrets, sast, osa, iac, dockerfile, linters]
    steps:
      - uses: actions/checkout@v4
      - run: echo "build stub — see templates/github/workflows/ci.yml"

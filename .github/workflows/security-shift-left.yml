name: Security Shift Left

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  ENABLE_REAL_LINTERS: "true"
  SECURITY_POLICY: config/security-gate-policy-adopt.yaml

jobs:
  security-gates:
    uses: ./.github/workflows/security-gates.yml
    secrets: inherit
    permissions:
      contents: read
      security-events: write
      pull-requests: read

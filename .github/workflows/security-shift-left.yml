# SUPERSEDED by release-gate.yml (2026-07-15): ci.yml's `uses:
# ./.github/workflows/security-shift-left.yml` call was broken anyway — this
# file only declared `pull_request`/`push` triggers, never `workflow_call`,
# so GitHub Actions could not have run it as a reusable workflow from ci.yml.
# It also defaulted SECURITY_POLICY to the warn-only "adopt" policy. Kept for
# manual/debug use only; not auto-triggered.
name: Security Shift Left

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  SECURITY_POLICY: config/security-gate-policy-adopt.yaml
  ENABLE_REAL_LINTERS: "true"

jobs:
  secrets:
    uses: ./.github/workflows/job-secret-scan.yml
    secrets: inherit
  sast:
    uses: ./.github/workflows/job-sast.yml
    secrets: inherit
  osa:
    uses: ./.github/workflows/job-osa.yml
    secrets: inherit
  iac:
    uses: ./.github/workflows/job-iac-scan.yml
    secrets: inherit
  dockerfile:
    uses: ./.github/workflows/job-dockerfile-lint.yml
    secrets: inherit
  linters:
    uses: ./.github/workflows/job-linter-security.yml
    secrets: inherit

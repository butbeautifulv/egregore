name: Release Gate

# Canonical CI/CD gate for egregore — the single required status check that
# blocks broken builds and known vulnerabilities from reaching `main`.
#
# Supersedes ci.yml, arch-gate.yml, adversarial-gate.yml, security-shift-left.yml
# and ci-profile.yml, which raced as five independent, uncoordinated workflows
# on every PR with no branch protection behind any of them — so none of them
# actually blocked anything. Those files are kept (workflow_dispatch only, not
# deleted) in case something external still references them; see the header
# comment added to each for why it was retired.
#
# Modeled directly on .gitlab/jobs/cxado/egregore-*.yml — the real, currently
# active corp GitLab pipeline for this product — reusing the same
# scripts/gate-check.py + config/security-gate-policy.yaml mechanism and the
# same blocker/warn split (GitLab's `.egregore_blocker` / `.egregore_warn`).
#
# All quality and security jobs below are blocking (no continue-on-error).
# Historical remediation notes: docs/CI_CD_KNOWN_GAPS.md (resolved).

on:
  pull_request:
    branches: [main, feature/microservice-refactoring]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_supply_chain:
        description: Run build+scan jobs (smoke)
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write
  pull-requests: read
  actions: read

env:
  STAGE: test
  USE_MEMORY_FALLBACK: "true"
  SECURITY_POLICY: config/security-gate-policy.yaml

jobs:
  # ---------------------------------------------------------------------
  # Blocking — must pass before merge
  # ---------------------------------------------------------------------

  adversarial:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [contracts, worker, api]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Abuse-case matrix
        run: uv run pytest tests/adversarial/ -m adversarial --strict-markers -q

  web-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_ui
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test lib/
      - run: bun run build

  secret-scan:
    uses: ./.github/workflows/job-secret-scan.yml
    secrets: inherit

  sast:
    uses: ./.github/workflows/job-sast.yml
    secrets: inherit

  osa:
    uses: ./.github/workflows/job-osa.yml
    secrets: inherit

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [contracts, worker, api]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Ruff
        run: uv run ruff check src tests
      - name: Type check
        run: uv run ty check src

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [contracts, worker, api]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Pytest batches
        run: ./scripts/pytest_batches.sh

  arch-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [contracts, worker, api]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Import linter
        run: uv run lint-imports
      - name: Import boundary audit
        run: uv run python scripts/verify_import_boundaries.py
      - name: No langfuse in core
        run: bash scripts/verify_no_langfuse_in_core.sh
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Architecture contract tests
        run: uv run pytest tests/architecture/ -q

  domain-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        # cys_core/domain only physically lives in contracts/ — worker/api
        # install it as an editable dependency, they don't have their own
        # copy of the source tree to measure coverage against.
        working-directory: backend/contracts
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Domain coverage (target 100%)
        run: |
          uv run pytest tests/domain/ -q \
            --cov=src/cys_core/domain --cov-report=term-missing --cov-fail-under=100

  # ---------------------------------------------------------------------
  # Stale comment removed: these four were originally warn-only, but are
  # now required — release-gate's `needs:`/aggregate check below fails the
  # whole gate if any of them doesn't succeed, same as every other job in
  # this file (see the "All quality and security jobs below are blocking"
  # note at the top). docs/CI_CD_KNOWN_GAPS.md already classifies them as
  # "Resolved gates", matching actual behavior — only this inline comment
  # had drifted from it.
  # ---------------------------------------------------------------------

  iac-scan:
    uses: ./.github/workflows/job-iac-scan.yml
    secrets: inherit

  dockerfile-lint:
    uses: ./.github/workflows/job-dockerfile-lint.yml
    secrets: inherit

  linter-security:
    uses: ./.github/workflows/job-linter-security.yml
    secrets: inherit

  skill-scanner:
    uses: ./.github/workflows/job-skill-scanner.yml
    secrets: inherit

  # ---------------------------------------------------------------------
  # Aggregate gate — THE status check to require in branch protection.
  # ---------------------------------------------------------------------

  release-gate:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - adversarial
      - web-ui
      - secret-scan
      - sast
      - osa
      - lint
      - unit-tests
      - arch-lint
      - domain-coverage
      - iac-scan
      - dockerfile-lint
      - linter-security
      - skill-scanner
    steps:
      - name: Evaluate required checks
        run: |
          set -eu
          fail=0
          declare -A results=(
            [adversarial]="${{ needs.adversarial.result }}"
            [web-ui]="${{ needs['web-ui'].result }}"
            [secret-scan]="${{ needs['secret-scan'].result }}"
            [sast]="${{ needs.sast.result }}"
            [osa]="${{ needs.osa.result }}"
            [lint]="${{ needs.lint.result }}"
            [unit-tests]="${{ needs['unit-tests'].result }}"
            [arch-lint]="${{ needs['arch-lint'].result }}"
            [domain-coverage]="${{ needs['domain-coverage'].result }}"
            [iac-scan]="${{ needs['iac-scan'].result }}"
            [dockerfile-lint]="${{ needs['dockerfile-lint'].result }}"
            [linter-security]="${{ needs['linter-security'].result }}"
            [skill-scanner]="${{ needs['skill-scanner'].result }}"
          )
          for job in "${!results[@]}"; do
            r="${results[$job]}"
            echo "$job: $r"
            if [ "$r" != "success" ]; then
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more required gate jobs did not succeed."
            exit 1
          fi
          echo "All required gates passed."

  # ---------------------------------------------------------------------
  # Main-only — build, supply chain, sign, deploy. Gated on release-gate,
  # so this never runs against an unmerged/unvetted commit.
  # ---------------------------------------------------------------------

  build:
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_supply_chain == 'true')
    needs: [release-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, worker]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ github.repository }}-${{ matrix.service }}:${{ github.sha }}

  sbom:
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_supply_chain == 'true')
    needs: [build]
    uses: ./.github/workflows/job-sbom.yml
    secrets: inherit

  container-scan:
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_supply_chain == 'true')
    needs: [build]
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      matrix:
        service: [api, worker]
    uses: ./.github/workflows/job-sca-image.yml
    secrets: inherit
    with:
      image: ghcr.io/${{ github.repository }}-${{ matrix.service }}:${{ github.sha }}

  sign:
    if: github.ref == 'refs/heads/main'
    needs: [container-scan]
    strategy:
      matrix:
        service: [api, worker]
    uses: ./.github/workflows/job-sign.yml
    secrets: inherit
    with:
      image: ghcr.io/${{ github.repository }}-${{ matrix.service }}:${{ github.sha }}

  deploy-preprod:
    if: github.ref == 'refs/heads/main'
    needs: [sign]
    uses: ./.github/workflows/deploy-preprod.yml
    secrets: inherit

  dast:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/dast.yml
    secrets: inherit

  sec-func-tests:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/job-sec-func-tests.yml
    secrets: inherit

  iast-preprod:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/job-iast-preprod.yml
    secrets: inherit

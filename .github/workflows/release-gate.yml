name: Release Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  STAGE: test
  USE_MEMORY_FALLBACK: "true"
  SECURITY_POLICY: config/security-gate-policy.yaml

jobs:
  adversarial:
    runs-on: ubuntu-latest
    steps:
      - run: echo hi

  web-ui:
    runs-on: ubuntu-latest
    steps:
      - run: echo hi

  secret-scan:
    uses: ./.github/workflows/job-secret-scan.yml
    secrets: inherit

  sast:
    uses: ./.github/workflows/job-sast.yml
    secrets: inherit

  osa:
    uses: ./.github/workflows/job-osa.yml
    secrets: inherit


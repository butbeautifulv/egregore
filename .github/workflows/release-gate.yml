name: Release Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  STAGE: test
  USE_MEMORY_FALLBACK: "true"
  SECURITY_POLICY: config/security-gate-policy.yaml

jobs:
  adversarial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Abuse-case matrix
        run: uv run pytest tests/adversarial/ -m adversarial --strict-markers -q

  web-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test lib/
      - run: bun run build

  secret-scan:
    uses: ./.github/workflows/job-secret-scan.yml
    secrets: inherit

  sast:
    uses: ./.github/workflows/job-sast.yml
    secrets: inherit

  osa:
    uses: ./.github/workflows/job-osa.yml
    secrets: inherit

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Ruff
        run: uv run ruff check src tests
      - name: Type check
        run: uv run ty check src

  unit-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Pytest batches
        run: ./scripts/pytest_batches.sh

  arch-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Import linter
        run: uv run lint-imports
      - name: Import boundary audit
        run: uv run python scripts/verify_import_boundaries.py
      - name: No langfuse in core
        run: bash scripts/verify_no_langfuse_in_core.sh
      - name: Architecture contract tests
        run: uv run pytest tests/architecture/ -q

  domain-coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Domain coverage (target 100%)
        run: |
          uv run pytest tests/domain/ -q \
            --cov=src/cys_core/domain --cov-report=term-missing --cov-fail-under=100

  iac-scan:
    uses: ./.github/workflows/job-iac-scan.yml
    secrets: inherit

  dockerfile-lint:
    uses: ./.github/workflows/job-dockerfile-lint.yml
    secrets: inherit

  linter-security:
    uses: ./.github/workflows/job-linter-security.yml
    secrets: inherit

  skill-scanner:
    uses: ./.github/workflows/job-skill-scanner.yml
    secrets: inherit

  release-gate:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - adversarial
      - web-ui
      - secret-scan
      - sast
      - osa
    steps:
      - name: Evaluate required checks
        run: |
          set -eu
          fail=0
          declare -A results=(
            [adversarial]="${{ needs.adversarial.result }}"
            [web-ui]="${{ needs['web-ui'].result }}"
            [secret-scan]="${{ needs['secret-scan'].result }}"
            [sast]="${{ needs.sast.result }}"
            [osa]="${{ needs.osa.result }}"
          )
          for job in "${!results[@]}"; do
            r="${results[$job]}"
            echo "$job: $r"
            if [ "$r" != "success" ]; then
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more required gate jobs did not succeed."
            exit 1
          fi
          echo "All required gates passed."

name: OSS Sign Image

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  cosign:
    runs-on: ubuntu-latest
    if: inputs.image != 'none' && inputs.image != ''
    steps:
      - uses: sigstore/cosign-installer@v4.1.2
      - name: Registry login
        env:
          REGISTRY_BACKEND: ${{ vars.REGISTRY_BACKEND || 'gitlab' }}
          REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
          REGISTRY_USER: ${{ vars.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          CI_REGISTRY: ghcr.io
          CI_REGISTRY_USER: ${{ github.actor }}
          CI_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ inputs.image }}
        run: bash scripts/registry-login.sh || true
      - name: Sign image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          IMAGE="${{ inputs.image }}"
          if [ -n "${COSIGN_PRIVATE_KEY:-}" ]; then
            echo "$COSIGN_PRIVATE_KEY" | cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$IMAGE"
          else
            cosign sign --yes "$IMAGE"
          fi

  skip:
    runs-on: ubuntu-latest
    if: inputs.image == 'none' || inputs.image == ''
    steps:
      - run: echo "No image to sign"

name: OSS API Fuzz (Schemathesis)

on:
  workflow_call:
    inputs:
      openapi_spec:
        required: false
        type: string
        default: ""
      api_base_url:
        required: false
        type: string
        default: ""
      phases:
        required: false
        type: string
        default: "examples,coverage,fuzzing"

permissions:
  contents: read

jobs:
  schemathesis:
    runs-on: ubuntu-latest
    env:
      PREPROD_URL: https://preprod.example.com
      OPENAPI_SPEC: ${{ inputs.openapi_spec }}
      API_BASE_URL: ${{ inputs.api_base_url }}
      SCHEMATHESIS_PHASES: ${{ inputs.phases }}
    steps:
      - uses: actions/checkout@v7
      - name: Schemathesis API fuzz
        run: |
          IMAGE="${OSS_SCHEMATHESIS_IMAGE:-ghcr.io/schemathesis/schemathesis:4.21.7}"
          mkdir -p reports
          PREPROD_URL="${PREPROD_URL:-https://preprod.example.com}"
          OPENAPI_SPEC="${OPENAPI_SPEC:-${PREPROD_URL}/openapi.json}"
          API_BASE_URL="${API_BASE_URL:-${PREPROD_URL}}"
          MOUNTS=(-v "$PWD/reports:/reports")
          if [ -f tests/security/schemathesis-hooks.py ]; then
            MOUNTS+=(-v "$PWD/tests/security/schemathesis-hooks.py:/app/hooks.py:ro")
          fi
          if [ -f openapi/openapi.yaml ]; then
            MOUNTS+=(-v "$PWD/openapi/openapi.yaml:/app/openapi.yaml:ro")
            SPEC="/app/openapi.yaml"
          elif [ -f openapi/openapi.json ]; then
            MOUNTS+=(-v "$PWD/openapi/openapi.json:/app/openapi.json:ro")
            SPEC="/app/openapi.json"
          else
            SPEC="${OPENAPI_SPEC}"
          fi
          docker run --rm "${MOUNTS[@]}" "$IMAGE" \
            run -w auto "$SPEC" --url "${API_BASE_URL}" \
            --phases "${SCHEMATHESIS_PHASES}" \
            --report junit --report-junit-path /reports/schemathesis-junit.xml || true
      - name: Gate check
        if: always()
        run: |
          [ -f reports/schemathesis-junit.xml ] || \
            echo '<?xml version="1.0"?><testsuite tests="0" failures="0" errors="0"/>' \
            > reports/schemathesis-junit.xml
          python scripts/gate-check.py --control fuzzing --report reports/schemathesis-junit.xml
      - name: ASPM export
        if: always() && vars.DEFECTDOJO_URL != ''
        env:
          DEFECTDOJO_URL: ${{ vars.DEFECTDOJO_URL }}
          DEFECTDOJO_API_TOKEN: ${{ secrets.DEFECTDOJO_API_TOKEN }}
        run: python scripts/aspm-export.py --control fuzzing --report reports/schemathesis-junit.xml || true
      - uses: actions/upload-artifact@v4
        with:
          name: schemathesis-junit
          path: reports/schemathesis-junit.xml

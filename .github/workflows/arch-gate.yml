# SUPERSEDED by release-gate.yml's `arch-lint` job (2026-07-15): this ran as a
# second, independent, uncoordinated copy of the same import-linter check
# ci.yml already had inline. Kept for manual/debug use only; not auto-triggered.
name: Architecture Gate

on:
  workflow_dispatch:

jobs:
  arch-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Import linter
        run: uv run lint-imports

      - name: Architecture audit baseline
        run: uv run python scripts/arch_audit.py

      - name: Tests + layered coverage
        env:
          STAGE: test
          USE_MEMORY_FALLBACK: "true"
        run: |
          uv run pytest tests/ -q \
            --cov=src/cys_core/domain --cov-fail-under=100 \
            --cov-report=term-missing:skip-covered

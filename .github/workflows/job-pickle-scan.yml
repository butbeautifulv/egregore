name: Pickle Scan

on:
  workflow_call:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/ai-ml-scan.py pickle_scan --report pickle-scan.sarif
      - run: python scripts/gate-check.py --control pickle_scan --report pickle-scan.sarif

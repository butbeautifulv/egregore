# SUPERSEDED by release-gate.yml's `adversarial` + `domain-coverage` jobs
# (2026-07-15): this raced independently alongside ci.yml's own domain-gate
# job — two separate 100%-coverage assertions on the same code. Kept for
# manual/debug use only; not auto-triggered.
name: Adversarial Gate

on:
  workflow_dispatch:

jobs:
  adversarial-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run abuse-case matrix (AI Agent Security §5.2 / §9)
        env:
          STAGE: test
          USE_MEMORY_FALLBACK: "true"
        run: |
          uv run pytest tests/adversarial/ -m adversarial --strict-markers -q

      - name: Domain coverage gate
        env:
          STAGE: test
          USE_MEMORY_FALLBACK: "true"
        run: |
          uv run pytest tests/domain/ -q --cov=src/cys_core/domain --cov-report=term-missing --cov-fail-under=100

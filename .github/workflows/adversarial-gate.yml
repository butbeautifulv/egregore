name: Adversarial Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  adversarial-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run abuse-case matrix (AI Agent Security §5.2 / §9)
        env:
          STAGE: test
          USE_MEMORY_FALLBACK: "true"
        run: |
          uv run pytest tests/adversarial/ -m adversarial --strict-markers -q

      - name: Domain coverage gate
        env:
          STAGE: test
          USE_MEMORY_FALLBACK: "true"
        run: |
          uv run pytest tests/domain/ -q --cov=cys_core/domain --cov-report=term-missing --cov-fail-under=100

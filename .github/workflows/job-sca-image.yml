name: SCA Image

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

jobs:
  trivy-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy registry credentials
        run: |
          echo "TRIVY_USERNAME=${{ github.actor }}" >> "$GITHUB_ENV"
          echo "TRIVY_PASSWORD=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_ENV"
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image }}
          scanners: vuln
          severity: CRITICAL,HIGH
          format: sarif
          output: sca.sarif
          exit-code: "0"
          trivyignores: deploy/.trivyignore
      - uses: ./.github/actions/gate-and-export
        if: always()
        with:
          control: sca
          report: sca.sarif
          category: sca

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  REGISTRY: ghcr.io/${{ github.repository }}
  ENABLE_REAL_LINTERS: ${{ vars.ENABLE_REAL_LINTERS || 'false' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: |
          if [ "$ENABLE_REAL_LINTERS" = "true" ]; then
            pip install ruff
            ruff check .
          else
            echo "Placeholder lint — set repo variable ENABLE_REAL_LINTERS=true"
          fi

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests
        run: |
          if [ -f requirements.txt ] && [ -d tests ]; then
            pip install pytest -r requirements.txt
            pytest tests/ -q
          else
            echo "Placeholder unit tests"
          fi

  security-gates:
    needs: [lint, unit-test]
    uses: ./.github/workflows/security-gates.yml
    secrets: inherit
    permissions:
      contents: read
      security-events: write
      pull-requests: read

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [security-gates]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Build image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t ${{ env.REGISTRY }}:${{ github.sha }} .
          else
            echo "No Dockerfile"
          fi

  sbom:
    if: github.ref == 'refs/heads/main'
    needs: build
    uses: ./.github/workflows/jobs/sbom.yml
    secrets: inherit

  container-scan:
    if: github.ref == 'refs/heads/main'
    needs: build
    uses: ./.github/workflows/jobs/container-scan.yml
    secrets: inherit
    with:
      image: ghcr.io/${{ github.repository }}:${{ github.sha }}

  sign:
    if: github.ref == 'refs/heads/main'
    needs: [container-scan]
    uses: ./.github/workflows/jobs/sign.yml
    secrets: inherit

  deploy-preprod:
    if: github.ref == 'refs/heads/main'
    needs: [sign]
    uses: ./.github/workflows/deploy-preprod.yml
    secrets: inherit

  dast:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/dast.yml
    secrets: inherit

  sec-func-tests:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/jobs/sec-func-tests.yml
    secrets: inherit

  iast-preprod:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/jobs/iast-preprod.yml
    secrets: inherit

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  REGISTRY: ghcr.io/${{ github.repository }}
  ENABLE_REAL_LINTERS: ${{ vars.ENABLE_REAL_LINTERS || 'false' }}
  SECURITY_POLICY: config/security-gate-policy-adopt.yaml

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: |
          if [ "$ENABLE_REAL_LINTERS" = "true" ]; then
            pip install ruff
            ruff check .
          else
            echo "Placeholder lint — set repo variable ENABLE_REAL_LINTERS=true"
          fi

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests
        run: |
          if [ -f requirements.txt ] && [ -d tests ]; then
            pip install pytest -r requirements.txt
            pytest tests/ -q
          else
            echo "Placeholder unit tests"
          fi

  secrets:
    needs: [lint, unit-test]
    uses: ./.github/workflows/job-secret-scan.yml
    secrets: inherit
  sast:
    needs: [lint, unit-test]
    uses: ./.github/workflows/job-sast.yml
    secrets: inherit
  osa:
    needs: [lint, unit-test]
    uses: ./.github/workflows/job-osa.yml
    secrets: inherit
  iac:
    needs: [lint, unit-test]
    uses: ./.github/workflows/job-iac-scan.yml
    secrets: inherit
  dockerfile:
    needs: [lint, unit-test]
    uses: ./.github/workflows/job-dockerfile-lint.yml
    secrets: inherit
  linters:
    needs: [lint, unit-test]
    uses: ./.github/workflows/job-linter-security.yml
    secrets: inherit

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [secrets, sast, osa, iac, dockerfile, linters]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Build image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t ${{ env.REGISTRY }}:${{ github.sha }} .
          else
            echo "No Dockerfile"
          fi

  sbom:
    if: github.ref == 'refs/heads/main'
    needs: build
    uses: ./.github/workflows/job-sbom.yml
    secrets: inherit

  container-scan:
    if: github.ref == 'refs/heads/main'
    needs: build
    uses: ./.github/workflows/job-container-scan.yml
    secrets: inherit
    with:
      image: ghcr.io/${{ github.repository }}:${{ github.sha }}

  sign:
    if: github.ref == 'refs/heads/main'
    needs: [container-scan]
    uses: ./.github/workflows/job-sign.yml
    secrets: inherit

  deploy-preprod:
    if: github.ref == 'refs/heads/main'
    needs: [sign]
    uses: ./.github/workflows/deploy-preprod.yml
    secrets: inherit

  dast:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/dast.yml
    secrets: inherit

  sec-func-tests:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/job-sec-func-tests.yml
    secrets: inherit

  iast-preprod:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/job-iast-preprod.yml
    secrets: inherit

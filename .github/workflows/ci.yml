# SUPERSEDED by release-gate.yml (2026-07-15): this file's own `unit-batches`
# and `arch-gate` jobs called `make test-batches` / `make arch-gate`, neither
# of which exists in the Makefile — this workflow could never have completed
# a run. Kept for manual/debug use only; not auto-triggered.
name: CI

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  REGISTRY: ghcr.io/${{ github.repository }}
  SECURITY_POLICY: config/security-gate-policy-adopt.yaml
  STAGE: test
  USE_MEMORY_FALLBACK: "true"
  AUTH_ENABLED: "0"
  RBAC_ENABLED: "0"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Ruff
        run: uv run ruff check src tests

  unit-batches:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Pytest batches
        run: make test-batches

  domain-gate:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Domain 100% gate
        run: make domain-gate

  verify-architecture:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Architecture gates
        run: make verify-architecture

  arch-gate:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Architecture test batch
        run: make arch-gate

  security-shift-left:
    needs: [unit-batches, domain-gate, verify-architecture, arch-gate]
    uses: ./.github/workflows/security-shift-left.yml
    secrets: inherit

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [security-shift-left]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Build image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t ${{ env.REGISTRY }}:${{ github.sha }} .
          else
            echo "No Dockerfile"
          fi

  sbom:
    if: github.ref == 'refs/heads/main'
    needs: build
    uses: ./.github/workflows/job-sbom.yml
    secrets: inherit

  container-scan:
    if: github.ref == 'refs/heads/main'
    needs: build
    uses: ./.github/workflows/job-sca-image.yml
    secrets: inherit
    with:
      image: ghcr.io/${{ github.repository }}:${{ github.sha }}

  sign:
    if: github.ref == 'refs/heads/main'
    needs: [container-scan]
    uses: ./.github/workflows/job-sign.yml
    secrets: inherit

  deploy-preprod:
    if: github.ref == 'refs/heads/main'
    needs: [sign]
    uses: ./.github/workflows/deploy-preprod.yml
    secrets: inherit

  dast:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/dast.yml
    secrets: inherit

  sec-func-tests:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/job-sec-func-tests.yml
    secrets: inherit

  iast-preprod:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-preprod]
    uses: ./.github/workflows/job-iast-preprod.yml
    secrets: inherit

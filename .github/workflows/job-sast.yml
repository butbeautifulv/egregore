name: SAST

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
          output: codeql-sarif
      - name: DIAGNOSTIC dump raw SARIF result shape
        if: always()
        run: |
          python3 -c "
import json
d = json.load(open('codeql-sarif/python.sarif'))
print('num runs:', len(d.get('runs', [])))
for i, run in enumerate(d.get('runs', [])):
    results = run.get('results', [])
    print(f'run[{i}] results count:', len(results))
    if results:
        print(f'run[{i}] results[0] keys:', list(results[0].keys()))
        print(json.dumps(results[0], indent=2)[:1500])
    rules = run.get('tool', {}).get('driver', {}).get('rules', [])
    print(f'run[{i}] rules count:', len(rules))
    for r in rules[:3]:
        print(' rule:', r.get('id'), 'defaultConfiguration:', r.get('defaultConfiguration'), 'properties.security-severity:', r.get('properties', {}).get('security-severity'))
"
      - name: Gate check CodeQL
        if: always()
        run: |
          REPORT="codeql-sarif/python.sarif"
          [ -f "$REPORT" ] || { echo "::error::CodeQL did not produce $REPORT — check the analyze step above; refusing to silently pass a SAST gate with no real report." >&2; exit 1; }
          POLICY="${SECURITY_POLICY:-config/security-gate-policy.yaml}"
          python scripts/gate-check.py --control sast --report "$REPORT" --policy "$POLICY"

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.117.0
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config p/ci --sarif -o semgrep.sarif .
      - name: Gate check
        if: always()
        run: |
          [ -s semgrep.sarif ] || { echo "::error::semgrep did not produce a non-empty semgrep.sarif — refusing to silently pass a SAST gate with no real report." >&2; exit 1; }
          POLICY="${SECURITY_POLICY:-config/security-gate-policy.yaml}"
          python3 scripts/gate-check.py --control sast --report semgrep.sarif --policy "$POLICY"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: sast-semgrep

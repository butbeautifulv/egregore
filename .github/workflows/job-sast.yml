name: SAST

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
          output: codeql-sarif
      - name: Gate check CodeQL
        if: always()
        run: |
          REPORT="codeql-sarif/python.sarif"
          [ -f "$REPORT" ] || { echo "::error::CodeQL did not produce $REPORT — check the analyze step above; refusing to silently pass a SAST gate with no real report." >&2; exit 1; }

          # CodeQL's local SARIF has no rule/severity metadata at all (GitHub
          # only attaches rule.defaultConfiguration.level / security-severity
          # server-side, after processing the upload) — confirmed by direct
          # inspection: tool.driver.rules is an empty array in the raw file,
          # and results[].level is absent too. gate-check.py's severity-based
          # evaluation can't recover data that structurally isn't there.
          #
          # Tried querying the Code Scanning Alerts API instead (which does
          # have real severity, via rule.security_severity_level) but it
          # consistently returned 0 alerts even for commits where the
          # analyses endpoint confirmed 3 real results were uploaded and
          # processed — an unverified, possibly branch/ref-timing-related
          # gap not worth shipping as a silent-pass risk in its own right.
          #
          # Until that's root-caused (see docs/CI_CD_KNOWN_GAPS.md), any
          # CodeQL finding blocks — coarser than proper severity grading,
          # but never silently passes a real vulnerability the way the
          # previous wrong-file-path bug did.
          python3 - <<'PYEOF'
          import json
          d = json.load(open("codeql-sarif/python.sarif"))
          for run in d.get("runs", []):
              for r in run.get("results", []):
                  loc = r.get("locations", [{}])[0].get("physicalLocation", {}).get("artifactLocation", {}).get("uri", "?")
                  line = r.get("locations", [{}])[0].get("physicalLocation", {}).get("region", {}).get("startLine", "?")
                  msg = (r.get("message", {}).get("text") or "").splitlines()[0][:160]
                  print(f"[{r.get('ruleId', '?')}] {loc}:{line} — {msg}")
          PYEOF
          COUNT=$(python3 -c "import json; d=json.load(open('$REPORT')); print(sum(len(r.get('results', [])) for r in d.get('runs', [])))")
          echo "[sast-codeql] findings=${COUNT}"
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::${COUNT} CodeQL finding(s) present — see above for file:line and message"
            exit 1
          fi
          echo "[sast-codeql] ok"

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.117.0
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config p/ci --sarif -o semgrep.sarif .
      - name: Gate check
        if: always()
        run: |
          [ -s semgrep.sarif ] || { echo "::error::semgrep did not produce a non-empty semgrep.sarif — refusing to silently pass a SAST gate with no real report." >&2; exit 1; }
          POLICY="${SECURITY_POLICY:-config/security-gate-policy.yaml}"
          python3 scripts/gate-check.py --control sast --report semgrep.sarif --policy "$POLICY"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: sast-semgrep

name: AI BOM

on:
  workflow_call:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/ai-ml-scan.py aibom --report aibom.json
      - run: python scripts/gate-check.py --control aibom --report aibom.json
      - uses: actions/upload-artifact@v6
        with:
          name: aibom
          path: aibom.json

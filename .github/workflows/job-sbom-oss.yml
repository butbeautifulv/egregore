name: OSS SBOM

on:
  workflow_call:

permissions:
  contents: read

jobs:
  syft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate SBOM
        run: |
          SYFT_VERSION="${OSS_SYFT_VERSION:-v1.20.0}"
          docker run --rm -v "$PWD:/work" -w /work "anchore/syft:${SYFT_VERSION}" \
            dir:. -o cyclonedx-json > sbom.cdx.json
          test -s sbom.cdx.json
      - name: Gate check SBOM
        run: python scripts/gate-check.py --control sbom --report sbom.cdx.json
      - uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90

name: OSS Nightly SAST

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep full scan
        run: |
          IMAGE="${OSS_SEMGREP_IMAGE:-returntocorp/semgrep:1.117.0}"
          docker run --rm -v "$PWD:/src" "$IMAGE" \
            semgrep scan --config auto --json -o /src/gl-sast-report.json /src || true
      - uses: actions/upload-artifact@v7
        with:
          name: nightly-sast
          path: gl-sast-report.json
          retention-days: 30

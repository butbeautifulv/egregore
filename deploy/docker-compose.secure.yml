services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: egregore-api:secure
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp/cys-agi-seccomp.json
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    environment:
      STAGE: prod
      CONTROL_MODE: daemon
      PERSISTENCE_CONNECTOR: postgres
      JOB_STORE_CONNECTOR: postgres
      USE_MEMORY_FALLBACK: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_DB: egregore
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - agent_internal
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    image: egregore-worker:secure
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp/cys-agi-seccomp.json
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    environment:
      STAGE: prod
      PERSISTENCE_CONNECTOR: postgres
      JOB_STORE_CONNECTOR: postgres
      USE_MEMORY_FALLBACK: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_DB: egregore
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USE_TOOL_GATEWAY: "true"
      TOOL_GATEWAY_URL: http://tool-gateway:8092
    networks:
      - agent_internal
    depends_on:
      - postgres
      - redis
      - tool-gateway

  # The PEP for sandboxed agent tool calls — see docs/MICROSERVICES_SPLIT_PLAN.md
  # §21.6/§10.8. Placed on agent_internal (no external access) alongside
  # worker/postgres/redis: worker reaches Postgres/Redis directly today (this
  # compose file predates the full PEP-only egress model §10.8 targets), but
  # standing this service up here for real is what makes tightening that
  # network boundary later possible without inventing new plumbing.
  tool-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.tool-gateway
    image: egregore-tool-gateway:secure
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp/cys-agi-seccomp.json
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    environment:
      STAGE: prod
      USE_MEMORY_FALLBACK: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_DB: egregore
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - agent_internal
    depends_on:
      - postgres
      - redis

  reverse-proxy:
    image: nginx:1.27-alpine
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=32m
      - /var/run:rw,noexec,nosuid,nodev,size=8m
    volumes:
      - ./nginx/cys-agi.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tls:/etc/nginx/tls:ro
      - ./mtls:/etc/nginx/mtls:ro
    ports:
      - "8443:8443"
    networks:
      - edge
      - agent_internal
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /run/postgresql:rw,noexec,nosuid,nodev,size=8m
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: egregore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    networks:
      - agent_internal

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes", "--protected-mode", "yes"]
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    volumes:
      - redis_data:/data
    networks:
      - agent_internal

networks:
  edge:
  agent_internal:
    internal: true

volumes:
  postgres_data:
  redis_data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

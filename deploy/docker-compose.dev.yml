services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    entrypoint: ["/app/api/.venv/bin/egregore"]
    command: ["serve", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    env_file:
      - ../backend/api/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      UI_CORS_ORIGINS: http://localhost:3000
      CONTROL_MODE: daemon
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - app

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    entrypoint: ["/app/worker/.venv/bin/egregore"]
    command: ["worker", "--daemon", "--idle-timeout", "0"]
    env_file:
      - ../backend/worker/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      WORKER_IDLE_TIMEOUT: "0"
      USE_TOOL_GATEWAY: "true"
      TOOL_GATEWAY_URL: http://tool-gateway:8092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tool-gateway:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - app

  # Opt-in Docker ExecutionBackend topology. The Docker socket grants the
  # Dispatcher effective host-root access, so this is deliberately isolated
  # from the regular `app` profile and must be enabled explicitly.
  dispatcher:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dispatcher
    image: cxado/egregore-dispatcher:docker-execution
    entrypoint: ["/app/dispatcher/.venv/bin/egregore-dispatcher"]
    command: ["worker", "--daemon", "--idle-timeout", "0"]
    env_file:
      - ../backend/dispatcher/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      EXECUTION_BACKEND: docker
      DOCKER_WORKER_IMAGE: cxado/egregore-agent-runtime:docker-execution
      DOCKER_NETWORK: deploy_default
      DOCKER_ENV_FILE: /run/egregore/agent-runtime.env
      USE_TOOL_GATEWAY: "true"
      TOOL_GATEWAY_URL: http://tool-gateway:8092
    group_add:
      # Set DOCKER_GID=$(stat -c '%g' /var/run/docker.sock) before `up` on Linux.
      - "${DOCKER_GID:-0}"
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../backend/agent-runtime/.env
        target: /run/egregore/agent-runtime.env
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tool-gateway:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - docker-execution

  # This service exists to build/tag the exact image that Dispatcher launches
  # with `docker run`; it is not started by the docker-execution profile.
  agent-runtime-image:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent-runtime
    image: cxado/egregore-agent-runtime:docker-execution
    profiles:
      - image-build

  # The PEP for sandboxed agent tool calls — see docs/MSP_BACKLOG.md
  # §21.6. Previously only reachable via `make dev-tool-gateway` run manually
  # alongside `docker compose up` — now a real service in the same stack, same
  # pattern as api/worker above.
  tool-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.tool-gateway
    entrypoint: ["/app/tool-gateway/.venv/bin/egregore"]
    command: ["tool-gateway", "--host", "0.0.0.0", "--port", "8092"]
    ports:
      - "8092:8092"
    env_file:
      - ../backend/tool-gateway/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    profiles:
      - app
      - docker-execution

  ui:
    build:
      context: ../web_ui
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_EGREGORE_API_URL: http://localhost:8080
    restart: unless-stopped
    profiles:
      - app

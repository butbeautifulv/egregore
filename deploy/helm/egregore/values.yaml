image:
  repository: cxado/egregore
  tag: local
  pullPolicy: IfNotPresent

ui:
  image:
    repository: cxado/egregore-ui
    tag: local
    pullPolicy: IfNotPresent
  replicas: 1

api:
  replicas: 1
  port: 8080
  uvicornWorkers: 1

worker:
  replicas: 2
  idleTimeout: 0
  metricsPort: 8081
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilization: 70

rollout:
  api:
    maxSurge: 1
    maxUnavailable: 0
  worker:
    maxSurge: 1
    maxUnavailable: 0

topologySpread:
  enabled: false
  maxSkew: 1
  whenUnsatisfiable: ScheduleAnyway

migrate:
  enabled: false

env:
  stage: prod
  useMemoryFallback: "false"
  useKafka: "false"
  kafkaBootstrapServers: ""
  useQdrant: "true"
  authEnabled: "false"
  authzMode: "off"
  openfgaApiUrl: ""
  openfgaStoreId: ""
  openfgaModelId: ""
  otelEnabled: "true"
  logLevel: "INFO"
  logFormat: "json"
  litellmLocalModelCostMap: "false"
  traceCriticEnabled: "true"
  uiCorsOrigins: ""
  streamAgentOutput: "false"
  streamAgentTools: "true"
  streamAgentTokenStreaming: "false"
  controlMode: ""

obs:
  traceBackend: "composite"

prometheus:
  multiprocHostPath: "/var/lib/cxado/prom-multiproc"

postgres:
  host: ""
  port: 5432
  user: postgres
  password: ""
  database: egregore

redis:
  host: ""
  port: 6379
  password: ""

qdrant:
  url: ""

veil:
  mcpUrl: ""
  mcpEnabled: "true"

siem:
  mcpUrl: ""
  mcpEnabled: "false"
  mcpTimeout: "180"

nessus:
  mcpUrl: ""
  mcpEnabled: "false"
  mcpTimeout: "180"

otel:
  endpoint: ""
  resourceAttributes: ""
  tracesSampler: "parentbased_always_on"
  tracesSamplerArg: "1.0"

langfuse:
  enabled: false
  host: ""
  publicKey: ""
  secretKey: ""

busSigningKey: ""
openfgaApiToken: ""

llm:
  provider: litellm
  model: ""
  baseUrl: ""
  temperature: "0.1"
  reasoningModel: ""
  reasoningTemperature: "0.0"

resources:
  api:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  worker:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1536Mi
  ui:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

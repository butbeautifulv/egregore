image:
  repository: cxado/egregore
  tag: local
  pullPolicy: IfNotPresent

ui:
  image:
    repository: cxado/egregore-ui
    tag: local
    pullPolicy: IfNotPresent
  replicas: 1

api:
  replicas: 1
  port: 8080

worker:
  replicas: 2
  idleTimeout: 0

migrate:
  enabled: false

env:
  stage: prod
  useMemoryFallback: "false"
  useKafka: "false"
  kafkaBootstrapServers: ""
  useQdrant: "true"
  authEnabled: "false"
  otelEnabled: "true"
  logLevel: "INFO"
  logFormat: "json"
  litellmLocalModelCostMap: "false"
  traceCriticEnabled: "true"

obs:
  traceBackend: "composite"

prometheus:
  multiprocHostPath: "/var/lib/cxado/prom-multiproc"

postgres:
  host: ""
  port: 5432
  user: postgres
  password: ""
  database: egregore

redis:
  host: ""
  port: 6379
  password: ""

qdrant:
  url: ""

veil:
  mcpUrl: ""

otel:
  endpoint: ""
  resourceAttributes: ""
  tracesSampler: "parentbased_always_on"
  tracesSamplerArg: "1.0"

langfuse:
  enabled: false
  host: ""
  publicKey: ""
  secretKey: ""

llm:
  provider: litellm
  model: ""
  baseUrl: ""
  temperature: "0.1"
  reasoningModel: ""
  reasoningTemperature: "0.0"

resources:
  api: {}
  worker: {}
  ui: {}

imagePullSecrets: []

# Legacy monolith alias — maps to api.image for migrate-job backward compat.
image:
  repository: cxado/egregore-api
  tag: local
  pullPolicy: IfNotPresent

ui:
  image:
    repository: cxado/egregore-ui
    tag: local
    pullPolicy: IfNotPresent
  replicas: 1

api:
  image:
    repository: cxado/egregore-api
    tag: local
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  uvicornWorkers: 1

dispatcher:
  enabled: false
  image:
    repository: cxado/egregore-dispatcher
    tag: local
    pullPolicy: IfNotPresent
  replicas: 2
  idleTimeout: 0
  metricsPort: 8081

agentRuntime:
  image:
    repository: cxado/egregore-agent-runtime
    tag: local
    pullPolicy: IfNotPresent

worker:
  replicas: 2
  idleTimeout: 0
  metricsPort: 8081
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilization: 70

# The PEP for sandboxed agent tool calls — see docs/MSP_BACKLOG.md
# §21.6. Own image (own Dockerfile.tool-gateway, own package, no langchain/
# agent-execution frameworks), same pattern as `ui` above rather than sharing
# `image:`.
toolGateway:
  enabled: true
  image:
    repository: cxado/egregore-tool-gateway
    tag: local
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8092

# Optional network chokepoint for LLM provider calls. It remains disabled and
# the runtime keeps using in-process LiteLLM until `llm.provider=model-gateway`
# is selected deliberately.
modelGateway:
  enabled: false
  image:
    repository: cxado/egregore-model-gateway
    tag: local
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8093
  defaultModel: "gpt-4o-mini"
  # Fail-closed egress policy. Enable only after resolving every configured
  # provider endpoint to stable CIDRs; a NetworkPolicy cannot safely allow a
  # hostname. Leaving this disabled preserves the current deployment behavior.
  networkPolicy:
    enabled: false
    providerCidrs: []
    dns:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns

rollout:
  api:
    maxSurge: 1
    maxUnavailable: 0
  dispatcher:
    maxSurge: 1
    maxUnavailable: 0
  worker:
    maxSurge: 1
    maxUnavailable: 0
  toolGateway:
    maxSurge: 1
    maxUnavailable: 0
  modelGateway:
    maxSurge: 1
    maxUnavailable: 0

topologySpread:
  enabled: false
  maxSkew: 1
  whenUnsatisfiable: ScheduleAnyway

migrate:
  enabled: false

env:
  stage: prod
  useMemoryFallback: "false"
  useKafka: "false"
  kafkaBootstrapServers: ""
  useQdrant: "true"
  authEnabled: "false"
  authzMode: "off"
  openfgaApiUrl: ""
  openfgaStoreId: ""
  openfgaModelId: ""
  otelEnabled: "true"
  logLevel: "INFO"
  logFormat: "json"
  litellmLocalModelCostMap: "false"
  traceCriticEnabled: "true"
  uiCorsOrigins: ""
  streamAgentOutput: "false"
  streamAgentTools: "true"
  streamAgentTokenStreaming: "false"
  controlMode: ""
  executionBackend: ""
  toolHitlMode: ""
  k8sWorkerImage: ""

obs:
  traceBackend: "composite"

prometheus:
  multiprocHostPath: "/var/lib/cxado/prom-multiproc"

postgres:
  host: ""
  port: 5432
  user: postgres
  password: ""
  database: egregore

redis:
  host: ""
  port: 6379
  password: ""

qdrant:
  url: ""

veil:
  mcpUrl: ""
  mcpEnabled: "true"

siem:
  mcpUrl: ""
  mcpEnabled: "false"
  mcpTimeout: "180"

nessus:
  mcpUrl: ""
  mcpEnabled: "false"
  mcpTimeout: "180"

otel:
  endpoint: ""
  resourceAttributes: ""
  tracesSampler: "parentbased_always_on"
  tracesSamplerArg: "1.0"

langfuse:
  enabled: false
  host: ""
  publicKey: ""
  secretKey: ""

busSigningKey: ""
openfgaApiToken: ""
# Shared by agent-runtime's ModelGatewayProvider and the model-gateway's bearer
# check. Required whenever modelGateway.enabled=true in a prod release.
gatewayAccessToken: ""

llm:
  provider: litellm
  model: ""
  baseUrl: ""
  temperature: "0.1"
  reasoningModel: ""
  reasoningTemperature: "0.0"

resources:
  api:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  worker:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1536Mi
  dispatcher:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1536Mi
  toolGateway:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  modelGateway:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ui:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

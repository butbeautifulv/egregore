apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "egregore.fullname" . }}-env
  labels:
    {{- include "egregore.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  STAGE: {{ .Values.env.stage | quote }}
  USE_MEMORY_FALLBACK: {{ .Values.env.useMemoryFallback | quote }}
  USE_DYNAMIC_CATALOG: "true"
  AGENTS_ROOT: "agents"
  USE_QDRANT: {{ .Values.env.useQdrant | quote }}
  AUTH_ENABLED: {{ .Values.env.authEnabled | quote }}
  AUTHZ_MODE: {{ .Values.env.authzMode | quote }}
  {{- if .Values.env.openfgaApiUrl }}
  OPENFGA_API_URL: {{ .Values.env.openfgaApiUrl | quote }}
  {{- end }}
  {{- if .Values.env.openfgaStoreId }}
  OPENFGA_STORE_ID: {{ .Values.env.openfgaStoreId | quote }}
  {{- end }}
  {{- if .Values.env.openfgaModelId }}
  OPENFGA_MODEL_ID: {{ .Values.env.openfgaModelId | quote }}
  {{- end }}
  OTEL_ENABLED: {{ .Values.env.otelEnabled | quote }}
  LOG_LEVEL: {{ .Values.env.logLevel | quote }}
  LOG_FORMAT: {{ .Values.env.logFormat | quote }}
  {{- if .Values.env.litellmLocalModelCostMap }}
  LITELLM_LOCAL_MODEL_COST_MAP: {{ .Values.env.litellmLocalModelCostMap | quote }}
  {{- end }}
  {{- if .Values.env.traceCriticEnabled }}
  TRACE_CRITIC_ENABLED: {{ .Values.env.traceCriticEnabled | quote }}
  {{- end }}
  COORDINATOR_CHAT_NARRATIVE: {{ .Values.env.coordinatorChatNarrative | default "false" | quote }}
  COORDINATOR_LLM_NARRATIVE: {{ .Values.env.coordinatorLlmNarrative | default "false" | quote }}
  {{- if .Values.env.llmRequestTimeout }}
  LLM_REQUEST_TIMEOUT: {{ .Values.env.llmRequestTimeout | quote }}
  {{- end }}
  {{- if .Values.env.workerJobTimeout }}
  WORKER_JOB_TIMEOUT: {{ .Values.env.workerJobTimeout | quote }}
  {{- end }}
  {{- if .Values.env.workerJobTimeoutIntel }}
  WORKER_JOB_TIMEOUT_INTEL: {{ .Values.env.workerJobTimeoutIntel | quote }}
  {{- end }}
  {{- if .Values.env.workerJobTimeoutSynth }}
  WORKER_JOB_TIMEOUT_SYNTH: {{ .Values.env.workerJobTimeoutSynth | quote }}
  {{- end }}
  {{- if .Values.env.defaultJobRecursionLimit }}
  DEFAULT_JOB_RECURSION_LIMIT: {{ .Values.env.defaultJobRecursionLimit | quote }}
  {{- end }}
  {{- if .Values.env.triageRecursionLimit }}
  TRIAGE_RECURSION_LIMIT: {{ .Values.env.triageRecursionLimit | quote }}
  {{- end }}
  {{- if .Values.env.maxPlannerPersonas }}
  MAX_PLANNER_PERSONAS: {{ .Values.env.maxPlannerPersonas | quote }}
  {{- end }}
  {{- if .Values.env.manualInvestigationAsync }}
  MANUAL_INVESTIGATION_ASYNC: {{ .Values.env.manualInvestigationAsync | quote }}
  {{- end }}
  {{- if .Values.env.uiCorsOrigins }}
  UI_CORS_ORIGINS: {{ .Values.env.uiCorsOrigins | quote }}
  {{- end }}
  {{- if .Values.env.streamAgentOutput }}
  STREAM_AGENT_OUTPUT: {{ .Values.env.streamAgentOutput | quote }}
  {{- end }}
  {{- if .Values.env.streamAgentTools }}
  STREAM_AGENT_TOOLS: {{ .Values.env.streamAgentTools | quote }}
  {{- end }}
  {{- if .Values.env.streamAgentTokenStreaming }}
  STREAM_AGENT_TOKEN_STREAMING: {{ .Values.env.streamAgentTokenStreaming | quote }}
  {{- end }}
  {{- if .Values.env.controlMode }}
  CONTROL_MODE: {{ .Values.env.controlMode | quote }}
  {{- end }}
  {{- if .Values.env.executionBackend }}
  EXECUTION_BACKEND: {{ .Values.env.executionBackend | quote }}
  {{- end }}
  {{- if .Values.env.toolHitlMode }}
  TOOL_HITL_MODE: {{ .Values.env.toolHitlMode | quote }}
  {{- end }}
  {{- if .Values.env.k8sWorkerImage }}
  K8S_WORKER_IMAGE: {{ .Values.env.k8sWorkerImage | quote }}
  {{- else if .Values.dispatcher.enabled }}
  K8S_WORKER_IMAGE: {{ include "egregore.agentRuntimeImage" . | quote }}
  {{- end }}
  {{- if .Values.env.useKafka }}
  USE_KAFKA: {{ .Values.env.useKafka | quote }}
  {{- end }}
  {{- if .Values.env.kafkaBootstrapServers }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.env.kafkaBootstrapServers | quote }}
  {{- end }}
  OBS_TRACE_BACKEND: {{ .Values.obs.traceBackend | quote }}
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  QDRANT_URL: {{ .Values.qdrant.url | quote }}
  TOOL_GATEWAY_URL: {{ printf "http://tool-gateway:%v" .Values.toolGateway.port | quote }}
  USE_TOOL_GATEWAY: {{ .Values.toolGateway.enabled | quote }}
  VEIL_MCP_URL: {{ .Values.veil.mcpUrl | quote }}
  {{- if .Values.veil.mcpEnabled }}
  VEIL_MCP_ENABLED: {{ .Values.veil.mcpEnabled | quote }}
  {{- end }}
  {{- if .Values.siem.mcpUrl }}
  SIEM_MCP_URL: {{ .Values.siem.mcpUrl | quote }}
  {{- end }}
  {{- if .Values.siem.mcpEnabled }}
  SIEM_MCP_ENABLED: {{ .Values.siem.mcpEnabled | quote }}
  {{- end }}
  {{- if .Values.siem.mcpTimeout }}
  SIEM_MCP_TIMEOUT: {{ .Values.siem.mcpTimeout | quote }}
  {{- end }}
  {{- if .Values.nessus.mcpUrl }}
  NESSUS_MCP_URL: {{ .Values.nessus.mcpUrl | quote }}
  {{- end }}
  {{- if .Values.nessus.mcpEnabled }}
  NESSUS_MCP_ENABLED: {{ .Values.nessus.mcpEnabled | quote }}
  {{- end }}
  {{- if .Values.nessus.mcpTimeout }}
  NESSUS_MCP_TIMEOUT: {{ .Values.nessus.mcpTimeout | quote }}
  {{- end }}
  {{- if .Values.env.jsonToolCallFallback }}
  EGREGORE_JSON_TOOL_CALL_FALLBACK: {{ .Values.env.jsonToolCallFallback | quote }}
  {{- end }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  {{- if .Values.otel.resourceAttributes }}
  OTEL_RESOURCE_ATTRIBUTES: {{ .Values.otel.resourceAttributes | quote }}
  {{- end }}
  OTEL_TRACES_SAMPLER: {{ .Values.otel.tracesSampler | quote }}
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.otel.tracesSamplerArg | quote }}
  {{- if and .Values.langfuse.enabled .Values.langfuse.host }}
  LANGFUSE_HOST: {{ .Values.langfuse.host | quote }}
  {{- end }}
  {{- if and .Values.langfuse.enabled .Values.langfuse.publicKey }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.langfuse.publicKey | quote }}
  {{- end }}
  {{- if .Values.llm.provider }}
  LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  {{- end }}
  {{- if .Values.llm.model }}
  LLM_MODEL: {{ .Values.llm.model | quote }}
  {{- end }}
  {{- if .Values.llm.baseUrl }}
  LLM_BASE_URL: {{ .Values.llm.baseUrl | quote }}
  {{- end }}
  {{- if .Values.llm.temperature }}
  LLM_TEMPERATURE: {{ .Values.llm.temperature | quote }}
  {{- end }}
  {{- if .Values.llm.reasoningModel }}
  REASONING_MODEL: {{ .Values.llm.reasoningModel | quote }}
  {{- end }}
  {{- if .Values.llm.reasoningTemperature }}
  REASONING_TEMPERATURE: {{ .Values.llm.reasoningTemperature | quote }}
  {{- end }}
  K8S_NAMESPACE: {{ .Release.Namespace | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "egregore.fullname" . }}-secrets
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- if .Values.busSigningKey }}
  BUS_SIGNING_KEY: {{ .Values.busSigningKey | quote }}
  {{- end }}
  {{- if .Values.openfgaApiToken }}
  OPENFGA_API_TOKEN: {{ .Values.openfgaApiToken | quote }}
  {{- end }}
  {{- if and .Values.langfuse.enabled .Values.langfuse.secretKey }}
  LANGFUSE_SECRET_KEY: {{ .Values.langfuse.secretKey | quote }}
  {{- end }}

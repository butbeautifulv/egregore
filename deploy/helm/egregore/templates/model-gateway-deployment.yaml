{{- if .Values.modelGateway.enabled }}
{{- if not .Values.gatewayAccessToken }}
{{- fail "gatewayAccessToken is required when modelGateway.enabled=true" }}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: model-gateway
  labels:
    {{- include "egregore.labels" . | nindent 4 }}
spec:
  selector:
    app: model-gateway
  ports:
    - name: http
      port: {{ .Values.modelGateway.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-gateway
  labels:
    app: model-gateway
    {{- include "egregore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.modelGateway.replicas }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollout.modelGateway.maxSurge }}
      maxUnavailable: {{ .Values.rollout.modelGateway.maxUnavailable }}
  selector:
    matchLabels:
      app: model-gateway
  template:
    metadata:
      labels:
        app: model-gateway
    spec:
      enableServiceLinks: false
      {{- include "egregore.podSecurityContext" . | nindent 6 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.modelGateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.modelGateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: model-gateway
          image: {{ include "egregore.modelGatewayImage" . | quote }}
          imagePullPolicy: {{ .Values.modelGateway.image.pullPolicy }}
          {{- include "egregore.containerSecurityContext" . | nindent 10 }}
          ports:
            - name: http
              containerPort: {{ .Values.modelGateway.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: egregore-env
            - secretRef:
                name: egregore-secrets
          env:
            - name: OTEL_SERVICE_NAME
              value: egregore-model-gateway
            - name: MODEL_GATEWAY_HOST
              value: 0.0.0.0
            - name: MODEL_GATEWAY_PORT
              value: {{ .Values.modelGateway.port | quote }}
          {{- with .Values.resources.modelGateway }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}

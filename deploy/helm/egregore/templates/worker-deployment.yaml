apiVersion: apps/v1
kind: Deployment
metadata:
  name: egregore-worker
  labels:
    app: egregore-worker
    {{- include "egregore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollout.worker.maxSurge }}
      maxUnavailable: {{ .Values.rollout.worker.maxUnavailable }}
  selector:
    matchLabels:
      app: egregore-worker
  template:
    metadata:
      labels:
        app: egregore-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.worker.metricsPort | default 8081 | quote }}
        prometheus.io/path: "/metrics"
    spec:
      enableServiceLinks: false
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "egregore.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/.venv/bin/egregore
            - worker
            - --daemon
            - --idle-timeout
            - {{ .Values.worker.idleTimeout | quote }}
            - --metrics-port
            - {{ .Values.worker.metricsPort | default 8081 | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.worker.metricsPort | default 8081 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: egregore-env
            - secretRef:
                name: egregore-secrets
          env:
            - name: PROMETHEUS_MULTIPROC_DIR
              value: /tmp/prom-multiproc
            - name: EGREGORE_METRICS_PORT
              value: {{ .Values.worker.metricsPort | default 8081 | quote }}
            - name: OTEL_SERVICE_NAME
              value: egregore-worker
          {{- with .Values.resources.worker }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: prom-multiproc
              mountPath: /tmp/prom-multiproc
      volumes:
        - name: prom-multiproc
          {{- if .Values.prometheus.multiprocHostPath }}
          hostPath:
            path: {{ .Values.prometheus.multiprocHostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}

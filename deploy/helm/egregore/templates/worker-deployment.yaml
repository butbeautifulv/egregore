apiVersion: apps/v1
kind: Deployment
metadata:
  name: egregore-worker
  labels:
    app: egregore-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: egregore-worker
  template:
    metadata:
      labels:
        app: egregore-worker
    spec:
      enableServiceLinks: false
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/.venv/bin/egregore
            - worker
            - --daemon
            - --idle-timeout
            - {{ .Values.worker.idleTimeout | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "egregore.fullname" . }}-env
            - secretRef:
                name: {{ include "egregore.fullname" . }}-secrets
          env:
            - name: PROMETHEUS_MULTIPROC_DIR
              value: /tmp/prom-multiproc
            - name: OTEL_SERVICE_NAME
              value: egregore-worker
          volumeMounts:
            - name: prom-multiproc
              mountPath: /tmp/prom-multiproc
      volumes:
        - name: prom-multiproc
          hostPath:
            path: {{ .Values.prometheus.multiprocHostPath }}
            type: DirectoryOrCreate

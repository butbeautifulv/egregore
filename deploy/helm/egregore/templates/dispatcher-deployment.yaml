{{- if .Values.dispatcher.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: egregore-dispatcher
  labels:
    app: egregore-dispatcher
    {{- include "egregore.labels" . | nindent 4 }}
spec:
  selector:
    app: egregore-dispatcher
  ports:
    - name: metrics
      port: {{ .Values.dispatcher.metricsPort | default 8081 }}
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: egregore-dispatcher
  labels:
    app: egregore-dispatcher
    {{- include "egregore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dispatcher.replicas }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollout.dispatcher.maxSurge }}
      maxUnavailable: {{ .Values.rollout.dispatcher.maxUnavailable }}
  selector:
    matchLabels:
      app: egregore-dispatcher
  template:
    metadata:
      labels:
        app: egregore-dispatcher
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.dispatcher.metricsPort | default 8081 | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: egregore-dispatcher
      automountServiceAccountToken: true
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dispatcher.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dispatcher.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app: egregore-dispatcher
      {{- end }}
      containers:
        - name: dispatcher
          image: {{ include "egregore.dispatcherImage" . | quote }}
          imagePullPolicy: {{ .Values.dispatcher.image.pullPolicy }}
          {{- include "egregore.containerSecurityContext" . | nindent 10 }}
          workingDir: /app/dispatcher
          command:
            - uv
            - run
            - egregore-dispatcher
            - worker
            - --daemon
            - --idle-timeout
            - {{ .Values.dispatcher.idleTimeout | quote }}
            - --metrics-port
            - {{ .Values.dispatcher.metricsPort | default 8081 | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.dispatcher.metricsPort | default 8081 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: egregore-env
            - secretRef:
                name: egregore-secrets
          env:
            - name: PROMETHEUS_MULTIPROC_DIR
              value: /tmp/prom-multiproc
            - name: EGREGORE_METRICS_PORT
              value: {{ .Values.dispatcher.metricsPort | default 8081 | quote }}
            - name: OTEL_SERVICE_NAME
              value: egregore-dispatcher
          {{- with .Values.resources.dispatcher }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: prom-multiproc
              mountPath: /tmp/prom-multiproc
      volumes:
        - name: tmp
          emptyDir: {}
        - name: prom-multiproc
          {{- if .Values.prometheus.multiprocHostPath }}
          hostPath:
            path: {{ .Values.prometheus.multiprocHostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}

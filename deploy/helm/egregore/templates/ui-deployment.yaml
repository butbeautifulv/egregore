apiVersion: v1
kind: Service
metadata:
  name: egregore-ui
  labels:
    {{- include "egregore.labels" . | nindent 4 }}
spec:
  selector:
    app: egregore-ui
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: egregore-ui
  labels:
    app: egregore-ui
    {{- include "egregore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: egregore-ui
  template:
    metadata:
      labels:
        app: egregore-ui
    spec:
      enableServiceLinks: false
      containers:
        - name: ui
          image: {{ include "egregore.uiImage" . | quote }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          env:
            - name: EGREGORE_API_UPSTREAM
              value: "http://egregore-api:8080"
          ports:
            - containerPort: 3000
          {{- with .Values.resources.ui }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

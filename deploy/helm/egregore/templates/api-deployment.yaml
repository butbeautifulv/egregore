apiVersion: v1
kind: Service
metadata:
  name: egregore-api
  labels:
    {{- include "egregore.labels" . | nindent 4 }}
spec:
  selector:
    app: egregore-api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: egregore-api
  labels:
    app: egregore-api
    {{- include "egregore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollout.api.maxSurge }}
      maxUnavailable: {{ .Values.rollout.api.maxUnavailable }}
  selector:
    matchLabels:
      app: egregore-api
  template:
    metadata:
      labels:
        app: egregore-api
    spec:
      enableServiceLinks: false
      {{- include "egregore.podSecurityContext" . | nindent 6 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app: egregore-api
      {{- end }}
      containers:
        - name: api
          image: {{ include "egregore.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "egregore.containerSecurityContext" . | nindent 10 }}
          command: ["/app/.venv/bin/egregore", "serve", "--host", "0.0.0.0", "--port", "{{ .Values.api.port }}", "--workers", "{{ .Values.api.uvicornWorkers }}"]
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: egregore-env
            - secretRef:
                name: egregore-secrets
          env:
            - name: OTEL_SERVICE_NAME
              value: egregore-api
            - name: PROMETHEUS_MULTIPROC_DIR
              value: /tmp/prom-multiproc
          {{- with .Values.resources.api }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: prom-multiproc
              mountPath: /tmp/prom-multiproc
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: prom-multiproc
          {{- if .Values.prometheus.multiprocHostPath }}
          hostPath:
            path: {{ .Values.prometheus.multiprocHostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}

{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "egregore.fullname" . }}-migrate
  labels:
    {{- include "egregore.labels" . | nindent 4 }}
spec:
  template:
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/.venv/bin/egregore", "migrate"]
          envFrom:
            - configMapRef:
                name: {{ include "egregore.fullname" . }}-env
            - secretRef:
                name: {{ include "egregore.fullname" . }}-secrets
          env:
            - name: OTEL_SERVICE_NAME
              value: egregore-migrate
{{- end }}

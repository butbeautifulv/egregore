{{- if .Values.dispatcher.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: egregore-dispatcher
  labels:
    app: egregore-dispatcher
    {{- include "egregore.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: egregore-dispatcher-jobs
  labels:
    {{- include "egregore.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: egregore-dispatcher-jobs
  labels:
    {{- include "egregore.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: egregore-dispatcher
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: egregore-dispatcher-jobs
{{- end }}

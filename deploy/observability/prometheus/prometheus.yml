global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: egregore-dev
    env: dev

scrape_configs:
  # Self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  # egregore API (ingress, worker metrics when jobs run in-process)
  - job_name: egregore-api
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: egregore-api
          component: ingress

  # MCP Tool Gateway (optional — start with: uv run egregore tool-gateway)
  - job_name: egregore-tool-gateway
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["host.docker.internal:8092"]
        labels:
          service: egregore-tool-gateway
          component: gateway

  # Tempo trace backend (in-compose)
  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: tempo
          component: tracing

  # Grafana (in-compose)
  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: grafana
          component: observability

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egregore-worker-egress
  namespace: egregore
spec:
  podSelector:
    matchLabels:
      app: egregore-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: tool-gateway
      ports:
        # 8092, not 8090 — 8090 is Veil Graph API, a different service. See
        # docs/MSP_BACKLOG.md §21.4/§21.6 (this was a real,
        # previously-unflagged mismatch against bootstrap/settings.py's
        # tool_gateway_url default, found while standing up the real
        # deploy/helm/egregore/templates/tool-gateway-deployment.yaml).
        - protocol: TCP
          port: 8092
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 19092

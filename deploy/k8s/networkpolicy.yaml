apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egregore-worker-egress
  namespace: egregore
spec:
  podSelector:
    matchLabels:
      app: egregore-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: tool-gateway
      ports:
        - protocol: TCP
          port: 8090
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 19092

apiVersion: batch/v1
kind: Job
metadata:
  name: agent-runtime-{{ persona }}-{{ run_id }}
  namespace: egregore
  labels:
    app: egregore-agent-runtime
    persona: "{{ persona }}"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: egregore-agent-runtime
        persona: "{{ persona }}"
    spec:
      runtimeClassName: "{{ runtime_class }}"
      restartPolicy: Never
      containers:
        - name: agent-runtime
          image: egregore-agent-runtime:latest
          workingDir: /app/agent-runtime
          args: ["uv", "run", "egregore", "run-sandboxed-job", "--job-json", "env:JOB_PAYLOAD_JSON"]
          envFrom:
            - configMapRef:
                name: egregore-env
            - secretRef:
                name: egregore-secrets
          env:
            - name: RUN_ID
              value: "{{ run_id }}"
            - name: JOB_PAYLOAD_JSON
              value: "{{ job_payload_json }}"
            - name: K8S_SANDBOX_CREDENTIALS_ONLY
              value: "true"
            - name: USE_TOOL_GATEWAY
              value: "true"
            - name: TOOL_GATEWAY_URL
              value: "http://tool-gateway:8092"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}

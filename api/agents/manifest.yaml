name: cys-agi
version: "0.1.0"
description: Secure multi-agent cybersecurity assessment platform

# Multi-product schema (Stream D1). Each product maps to a catalog profile_id.
products:
  - id: cybersec-soc
    profile_id: cybersec-soc
    domain: cybersecurity
    pack: bootstrap.product_packs.CYBERSEC_SOC_PRODUCT
  - id: general-assistant
    profile_id: general-assistant
    domain: general
    pack: bootstrap.product_packs.GENERAL_ASSISTANT_PRODUCT
  - id: gaia-benchmark
    profile_id: gaia-benchmark
    domain: benchmark
    pack: bootstrap.product_packs.GAIA_BENCHMARK_PRODUCT

layout:
  personas: personas/       # agent definitions (agent.yaml + AGENT.md)
  rules: rules/             # global constraints for all agents
  plans: plans/             # assessment playbooks
  skills: skills/           # on-demand domain knowledge modules

personas:
  workers:
    - redteam
    - network
    - soc
    - compliance
    - consultant
    - intel
    - hunter
    - identity
    - dfir
    - cloud
    - purple
    - conductor
    - research
    - gaia_solver
    - coding
  control: [critic, coordinator]

default_plan: incident-triage

plans:
  - id: incident-triage
    file: plans/incident-triage.yaml
    description: Event-driven SOC and network workers
  - id: compliance-audit
    file: plans/compliance-audit.yaml
    description: Compliance worker for documents and schedules
  - id: redteam-engagement
    file: plans/redteam-engagement.yaml
    description: Authorized redteam worker on escalation
  - id: full-assessment
    file: plans/full-assessment.yaml
    description: Manual investigation — all workers
  - id: consultation
    file: plans/consultation.yaml
    description: Advisory consultation — consultant worker
  - id: kill-chain-assessment
    file: plans/kill-chain-assessment.yaml
    description: Kill-chain aligned worker routing

skills:
  - ai-agent-security
  - ci-cd-threats
  - compliance-frameworks
  - network-beaconing
  - prompt-injection-defense
  - rag-security
  - secure-deployment
  - skill-supply-chain
  - threat-intel-osint
  - endpoint-hunting
  - identity-attacks
  - digital-forensics
  - cloud-threat-detection
  - kill-chain-purple

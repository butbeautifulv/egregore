id: incident-triage
name: Incident triage
description: SOC and network workers for active incidents

routing:
  rules:
    - event_types: [siem.alert, edr.alert, iam.event]
      min_severity: low
      personas: [soc]
      notify_control: true
    - event_types: [edr.alert]
      min_severity: medium
      personas: [hunter, soc]
      notify_control: true
    - event_types: [iam.event, ad.alert]
      personas: [identity, soc]
      notify_control: true
    - event_types: [netflow.beacon, dns.anomaly]
      personas: [network]
      notify_control: true
    - event_types: [escalation]
      personas: [network, soc]
      notify_control: true

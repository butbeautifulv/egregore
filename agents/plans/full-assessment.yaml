id: full-assessment
name: Full security assessment
description: Parallel specialist analysis with critic reconciliation and HITL gate

pipeline: langgraph
entrypoint: graph.workflow.run_assessment

stages:
  - id: ingest
    action: sanitize_and_rate_limit
  - id: specialists
    parallel: true
    personas: [redteam, network, soc, compliance]
  - id: critic
    personas: [critic]
  - id: hitl
    condition: high_severity_or_low_trust
  - id: report
    action: publish_or_reject

hitl:
  auto_approve_dev: true
  trust_threshold: 0.5

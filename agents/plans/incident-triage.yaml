id: incident-triage
name: Incident triage
description: Focused SOC and network correlation for active incidents

pipeline: langgraph
entrypoint: graph.workflow.run_assessment

stages:
  - id: ingest
    action: sanitize_and_rate_limit
  - id: specialists
    parallel: true
    personas: [soc, network]
  - id: critic
    personas: [critic]
  - id: hitl
    condition: high_severity_or_low_trust
  - id: report
    action: publish_or_reject
